steps:
  # Build FastAPI image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/langgraph-docbot-api', '-f', 'Dockerfile', '.']
  
  # Build Streamlit image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/langgraph-docbot-ui', '-f', 'Dockerfile.streamlit', '.']
  
  # Push FastAPI image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/langgraph-docbot-api']
  
  # Push Streamlit image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/langgraph-docbot-ui']
  
  # Deploy FastAPI to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'langgraph-docbot-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/langgraph-docbot-api'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '300'
      - '--max-instances'
      - '10'
      - '--set-secrets'
      - 'GOOGLE_API_KEY=google-api-key:latest'
      - '--set-env-vars'
      - 'MODEL_NAME=gemini-2.5-flash,DOCS_OUTPUT_DIR=/tmp/generated_docs'
  
  # Get FastAPI URL and deploy Streamlit
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        FASTAPI_URL=$$(gcloud run services describe langgraph-docbot-api \
          --platform managed \
          --region us-central1 \
          --format 'value(status.url)')
        
        gcloud run deploy langgraph-docbot-ui \
          --image gcr.io/$PROJECT_ID/langgraph-docbot-ui \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --port 8501 \
          --memory 1Gi \
          --cpu 1 \
          --timeout 300 \
          --max-instances 10 \
          --set-env-vars="API_URL=$$FASTAPI_URL"

images:
  - 'gcr.io/$PROJECT_ID/langgraph-docbot-api'
  - 'gcr.io/$PROJECT_ID/langgraph-docbot-ui'

options:
  logging: CLOUD_LOGGING_ONLY

